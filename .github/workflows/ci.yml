name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only, no install needed)
        run: python -m unittest discover -s tests -t . -v
      - name: Smoke-test the CLI against the bundled example repo
        run: |
          python -m wouldrun examples/example-repo --list
          python -m wouldrun examples/example-repo --event push --ref refs/heads/main --changed src/app.py

  # Everything here has to read like a person wrote it, code and docs alike.
  # noslop's code mode scores each source file for machine-writing tells and
  # fails at 10/100 lines. Pinned so a rules bump can't redden CI on its own.
  noslop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install noslop-lint==0.10.0
      - name: Source reads human (code mode)
        run: git ls-files -z '*.py' | grep -zv '^tests/fixtures/' | xargs -0r noslop --no-config
      - name: Docs read human (prose mode)
        run: git ls-files -z '*.md' | xargs -0r noslop --no-config
